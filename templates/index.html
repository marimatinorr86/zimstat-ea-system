<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>ZIMSTAT EA Retrieval System</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <style>

        *{

            font-family:'Poppins', sans-serif;
        }

        body{

            background:
            linear-gradient(135deg,#0d6efd,#4b0082);

            min-height:100vh;

            overflow-x:hidden;
        }

        /* SIDEBAR */
        .sidebar{

            width:260px;

            height:100vh;

            position:fixed;

            background:rgba(255,255,255,0.1);

            backdrop-filter:blur(12px);

            padding-top:30px;

            box-shadow:0 0 25px rgba(0,0,0,0.2);
        }

        .sidebar a{

            display:block;

            color:white;

            text-decoration:none;

            padding:15px 25px;

            margin:10px;

            border-radius:12px;

            transition:0.3s;

            font-weight:500;
        }

        .sidebar a:hover{

            background:white;

            color:#0d6efd;

            transform:translateX(5px);
        }

        /* LOGO */
        .logo-img{

            background:white;

            padding:10px;

            border-radius:20px;

            box-shadow:0 4px 15px rgba(0,0,0,0.2);

            transition:0.3s;
        }

        .logo-img:hover{

            transform:scale(1.05);
        }

        /* MAIN CONTENT */
        .main-content{

            margin-left:280px;

            padding:40px;
        }

        /* GLASS CARD */
        .glass-card{

            background:rgba(255,255,255,0.15);

            backdrop-filter:blur(12px);

            border-radius:25px;

            padding:30px;

            box-shadow:0 8px 32px rgba(0,0,0,0.2);

            color:white;

            transition:0.3s;
        }

        .glass-card:hover{

            transform:translateY(-5px);
        }

        /* TITLE */
        .main-title{

            font-size:2.8rem;

            font-weight:700;
        }

        /* SEARCH BOX */
        .search-box{

            border:none;

            border-radius:15px;

            padding:15px;

            width:100%;

            font-size:1rem;
        }

        .search-btn{

            border:none;

            border-radius:15px;

            padding:15px;

            width:100%;

            background:#ffc107;

            color:black;

            font-weight:600;

            transition:0.3s;
        }

        .search-btn:hover{

            background:white;

            transform:translateY(-2px);
        }

        /* STAT CARDS */
        .stat-value{

            font-size:2.5rem;

            font-weight:700;
        }

        .icon{

            font-size:2rem;

            margin-bottom:10px;
        }

        /* MAP EMBED */
        iframe{

            width:100%;

            height:600px;

            border:none;

            border-radius:20px;
        }

    </style>

</head>

<body>

    <!-- SIDEBAR -->
    <div class="sidebar">

        <!-- LOGO -->
        <div class="text-center mb-5">

            <img src="{{ url_for('static', filename='images/zimstat_logo.png') }}"

                 width="90"

                 class="mb-3 logo-img">

            <h3 class="fw-bold text-white">

                ZIMSTAT

            </h3>

            <p class="text-light small">

                EA Spatial Database System

            </p>

        </div>

        <!-- MENU -->

        <a href="/">

            <i class="bi bi-search"></i>
            Search EA

        </a>

        <a href="/map">

            <i class="bi bi-map-fill"></i>
            GIS Viewer

        </a>

        <a href="/reports">

            <i class="bi bi-bar-chart-fill"></i>
            GIS Analytics

        </a>

        <a href="/download_shapefile">

            <i class="bi bi-download"></i>
            Downloads

        </a>

    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content">

        <!-- HEADER -->
        <div class="glass-card mb-4">

            <h1 class="main-title">

                <i class="bi bi-globe2"></i>
                ZIMSTAT EA Retrieval System

            </h1>

            <p class="mt-3">

                Web-Based Enumeration Area Spatial Database Management System

            </p>

        </div>

        <!-- SEARCH SECTION -->
        <div class="glass-card mb-4">

            <h3 class="mb-4">

                <i class="bi bi-search"></i>
                Search Enumeration Area

            </h3>

            <form action="/search"
                  method="POST">

                <div class="row">

                    <div class="col-md-9 mb-3">

                        <input type="text"

                               name="ea_number"

                               placeholder="Enter EA Number..."

                               class="search-box"

                               required>

                    </div>

                    <div class="col-md-3 mb-3">

                        <button type="submit"
                                class="search-btn">

                            Search EA

                        </button>

                    </div>

                </div>

            </form>

        </div>

        <!-- STATISTICS -->
        <div class="row mb-4">

            <!-- TOTAL EAs -->
            <div class="col-md-4 mb-3">

                <div class="glass-card text-center">

                    <div class="icon">

                        <i class="bi bi-map"></i>

                    </div>

                    <h5>Total EAs</h5>

                    <div class="stat-value">

                        {{ total_eas }}

                    </div>

                </div>

            </div>

            <!-- IMAGES -->
            <div class="col-md-4 mb-3">

                <div class="glass-card text-center">

                    <div class="icon">

                        <i class="bi bi-image-fill"></i>

                    </div>

                    <h5>Total Images</h5>

                    <div class="stat-value">

                        {{ total_images }}

                    </div>

                </div>

            </div>

            <!-- DISTRICTS -->
            <div class="col-md-4 mb-3">

                <div class="glass-card text-center">

                    <div class="icon">

                        <i class="bi bi-geo-alt-fill"></i>

                    </div>

                    <h5>Districts</h5>

                    <div class="stat-value">

                        {{ total_districts }}

                    </div>

                </div>

            </div>

        </div>

        

    </div>

</body>

</html>
