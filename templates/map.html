<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ZIMSTAT Web GIS</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body {
            margin: 0;
            font-family: Poppins, sans-serif;
            background: #f5f7fa;
        }

        #map {
            height: 100vh;
            width: 100%;
        }

        .title-box {
            position: absolute;
            top: 20px;
            left: 70px;
            z-index: 1000;
            background: white;
            padding: 15px 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .search-box {
            position: absolute;
            top: 140px;
            left: 70px;
            z-index: 1000;
            background: white;
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

    </style>

</head>

<body>

    <!-- TITLE -->
    <div class="title-box">

        <h3>ZIMSTAT EA Web GIS</h3>
        <p>Interactive Enumeration Area Viewer</p>

    </div>

    <!-- SEARCH -->
    <div class="search-box">

        <input type="text" id="eaInput" class="form-control" placeholder="Enter EA (e.g. KK001)">
        <button class="btn btn-primary mt-2 w-100" onclick="loadEA()">Load EA</button>

    </div>

    <!-- MAP -->
    <div id="map"></div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <script>

        // INIT MAP
        var map = L.map('map').setView([-18.93, 29.81], 10);

        // BASEMAP
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // STORE LAYER
        let eaLayer;

        // LOAD SINGLE EA FUNCTION
        function loadEA(geocode) {

            // if button used
            if (!geocode) {
                geocode = document.getElementById("eaInput").value;
            }

            fetch(`/map/${geocode}`)
                .then(res => res.json())
                .then(data => {

                    // remove old layer
                    if (eaLayer) {
                        map.removeLayer(eaLayer);
                    }

                    // add new layer
                    eaLayer = L.geoJSON(data, {

                        style: {
                            color: 'red',
                            weight: 3,
                            fillOpacity: 0.4
                        },

                        onEachFeature: function(feature, layer) {

                            layer.bindPopup(
                                "<b>EA:</b> " + feature.properties.geocode +
                                "<br><b>EA Number:</b> " + feature.properties.ea_number
                            );
                        }

                    }).addTo(map);

                    // zoom to EA
                    map.fitBounds(eaLayer.getBounds());

                })
                .catch(err => {
                    alert("EA not found or server error");
                    console.log(err);
                });
        }

    </script>

</body>

</html>
