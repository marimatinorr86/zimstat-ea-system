<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>ZIMSTAT Web GIS</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet"
          href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{

            margin:0;

            font-family:Poppins,sans-serif;

            background:#f5f7fa;
        }

        #map{

            height:100vh;

            width:100%;
        }

        .title-box{

            position:absolute;

            top:20px;

            left:70px;

            z-index:1000;

            background:white;

            padding:15px 25px;

            border-radius:15px;

            box-shadow:0 4px 15px rgba(0,0,0,0.2);
        }

    </style>

</head>

<body>

    <!-- TITLE -->
    <div class="title-box">

        <h3>

            ZIMSTAT EA Web GIS

        </h3>

        <p>

            Interactive Enumeration Area Viewer

        </p>

    </div>

    <!-- MAP -->
    <div id="map"></div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <script>

        // CREATE MAP
        var map = L.map('map').setView([-18.93, 29.81], 10);

        // BASEMAP
        L.tileLayer(

            'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',

            {

                attribution:'© OpenStreetMap contributors'

            }

        ).addTo(map);

        // LOAD GEOJSON
        fetch('/static/kwekwe_eas.geojson')

        .then(response => response.json())

        .then(data => {

            L.geoJSON(data, {

                style: {

                    color: '#0d6efd',
                    weight: 2,
                    fillOpacity: 0.3

                },

                onEachFeature: function(feature, layer){

                    layer.bindPopup(

                        "<b>EA Number:</b> " +

                        feature.properties["EA NUMBER"]

                    );

                }

            }).addTo(map);

        });

    </script>

</body>

</html>
