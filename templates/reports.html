<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>ZIMSTAT Reports</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>

        body{

            background:#f4f6f9;

            font-family:Poppins,sans-serif;

            padding:40px;
        }

        .card-box{

            background:white;

            border-radius:20px;

            padding:30px;

            box-shadow:0 4px 15px rgba(0,0,0,0.1);

            margin-bottom:30px;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1 class="mb-4">

            ZIMSTAT Analytics Dashboard

        </h1>

        <!-- CHART -->
        <div class="card-box">

            <h3 class="mb-4">

                Population vs Households

            </h3>

            <canvas id="myChart"></canvas>

        </div>

    </div>

    <script>

        const ctx = document.getElementById('myChart');

        new Chart(ctx, {

            type: 'bar',

            data: {

                labels: [

                    'EA 001',
                    'EA 002',
                    'EA 003',
                    'EA 004'

                ],

                datasets: [

                    {

                        label: 'Population',

                        data: [

                            540,
                            720,
                            610,
                            890

                        ]

                    },

                    {

                        label: 'Households',

                        data: [

                            120,
                            160,
                            140,
                            210

                        ]

                    }

                ]

            }

        });

    </script>

</body>

</html>
